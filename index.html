<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>葡语单词学习</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="app">
    <section class="card">
      <div class="settings-row">
        <label for="dailyCount">今日背诵数量</label>
        <input id="dailyCount" type="number" min="5" max="100" value="20" />
        <button id="startBtn" type="button">开始本轮</button>
      </div>

      <div class="topbar">
        <span id="progress">加载中...</span>
        <span id="score">答对 0 题</span>
      </div>

      <div class="word-box">
        <div id="word" class="word">...</div>
        <div id="pos" class="pos"></div>
      </div>

      <div id="choices" class="choices"></div>

      <div id="feedback" class="feedback"></div>

      <div class="actions">
        <button id="nextBtn" disabled>下一题</button>
      </div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
